name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # uv reads .python-version natively, so this provisions Python 3.11 (as
      # pinned in that file) and installs the dev dependency group.
      - name: Install dependencies (including dev group)
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # Plain invocation is rename-proof: it picks up `testpaths` from
      # pyproject.toml rather than hardcoding a folder.
      - name: Pytest
        run: uv run pytest

  notebook:
    # Re-execute the example notebook and fail if it drifts from what's
    # committed -- outputs included. The notebook is committed with outputs but
    # with volatile metadata stripped (nbstripout --keep-output), and its cells
    # suppress the remaining non-deterministic output sources (mlflow INFO
    # logs, progress bars, run-id columns), so the diff catches execution
    # errors, un-committed code changes, AND changed outputs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (including dev group)
        run: uv sync --dev

      - name: Execute notebook and check it is in sync (outputs included)
        working-directory: pyfixest-regression
        run: |
          uv run jupyter execute example.ipynb --output=example.ipynb
          uv run nbstripout --keep-output example.ipynb
          git diff --exit-code -- example.ipynb

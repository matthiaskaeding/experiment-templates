name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # uv reads .python-version natively, so this provisions Python 3.11 (as
      # pinned in that file) and installs the dev dependency group.
      - name: Install dependencies (including dev group)
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # Plain invocation is rename-proof: it picks up `testpaths` from
      # pyproject.toml rather than hardcoding a folder.
      - name: Pytest
        run: uv run pytest
